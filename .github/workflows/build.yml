name: Build Windows EXE

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Maven dependencies
        uses: actions/cache@v3
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2

      - name: Build JAR
        run: ./mvnw clean package -DskipTests

      - name: Install WiX Toolset (required for jpackage)
        run: choco install wixtoolset -y

      - name: Create Windows EXE with Spring Boot JarLauncher
        run: |
          jpackage `
            --input target/ `
            --name AwakedPoeTrade `
            --main-jar AwakedPoeTrade-0.0.1-SNAPSHOT.jar `
            --main-class org.springframework.boot.loader.launch.JarLauncher `
            --java-options "-Dspring-boot.run.main=com.example.awakedPoeTrade.AwakedPoeTradeApplication" `
            --type app-image `
            --dest dist/ `
            --win-console `
            --vendor "YourName" `
            --app-version "1.0.0"

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: AwakedPoeTrade-Windows
          path: dist/AwakedPoeTrade/